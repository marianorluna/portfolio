<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>OG Preview — Mariano Luna</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      font-family: 'Inter', system-ui, sans-serif;
    }

    .og {
      position: relative;
      width: 1200px;
      height: 630px;
      background: #323232;
      overflow: hidden;
    }

    /* Grid perspectiva (escena 3D) */
    .scene {
      position: absolute;
      inset: 0;
    }

    .scene__glow {
      position: absolute;
      width: 720px;
      height: 720px;
      right: -80px;
      top: 50%;
      transform: translateY(-50%);
      background: radial-gradient(circle at 40% 50%, rgba(0, 112, 243, 0.22) 0%, transparent 58%),
                  radial-gradient(circle at 65% 40%, rgba(0, 229, 255, 0.18) 0%, transparent 52%);
      pointer-events: none;
    }

    .scene__grid {
      position: absolute;
      right: -120px;
      bottom: -40px;
      width: 900px;
      height: 520px;
      transform: perspective(520px) rotateX(62deg);
      transform-origin: center bottom;
      background:
        linear-gradient(90deg, rgba(74, 85, 104, 0.55) 1px, transparent 1px),
        linear-gradient(rgba(45, 53, 72, 0.7) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: linear-gradient(to top, black 0%, black 55%, transparent 100%);
      -webkit-mask-image: linear-gradient(to top, black 0%, black 55%, transparent 100%);
    }

    .scene__horizon {
      position: absolute;
      right: 0;
      top: 42%;
      width: 72%;
      height: 2px;
      background: linear-gradient(90deg, transparent, #4a5568 20%, #4a5568 80%, transparent);
      opacity: 0.85;
    }

    /* Edificios wireframe */
    .buildings {
      position: absolute;
      right: 48px;
      bottom: 88px;
      width: 640px;
      height: 340px;
    }

    .building {
      position: absolute;
      bottom: 0;
      border: 1.5px solid rgba(51, 51, 51, 0.9);
      background: linear-gradient(180deg, rgba(46, 46, 46, 0.92) 0%, rgba(10, 10, 10, 0.95) 100%);
      box-shadow:
        inset 0 0 0 1px rgba(0, 229, 255, 0.08),
        0 0 40px rgba(0, 112, 243, 0.12);
    }

    .building::before {
      content: '';
      position: absolute;
      inset: 8px;
      border: 1px solid rgba(0, 229, 255, 0.15);
      pointer-events: none;
    }

    .building--1 { left: 40px; width: 88px; height: 200px; }
    .building--2 { left: 150px; width: 110px; height: 260px; }
    .building--3 { left: 280px; width: 96px; height: 180px; }
    .building--4 { left: 400px; width: 130px; height: 300px; }
    .building--5 { left: 548px; width: 72px; height: 220px; }

    .building--2::after,
    .building--4::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, #0070f3, #00e5ff);
      opacity: 0.75;
    }

    /* Partículas / luces */
    .particles span {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #00e5ff;
      box-shadow: 0 0 12px #00e5ff;
      opacity: 0.7;
    }

    .particles span:nth-child(1) { right: 280px; top: 120px; }
    .particles span:nth-child(2) { right: 420px; top: 180px; opacity: 0.5; }
    .particles span:nth-child(3) { right: 180px; top: 200px; width: 3px; height: 3px; }
    .particles span:nth-child(4) { right: 520px; top: 140px; background: #0070f3; box-shadow: 0 0 10px #0070f3; }

    /* Overlay izquierdo para legibilidad */
    .og__overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(105deg,
        rgba(31, 31, 31, 0.97) 0%,
        rgba(31, 31, 31, 0.88) 38%,
        rgba(50, 50, 50, 0.35) 62%,
        transparent 100%);
    }

    /* Contenido texto */
    .content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      justify-content: center;
      height: 100%;
      padding: 64px 72px;
      max-width: 620px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      border-radius: 12px;
      border: 1px solid rgba(0, 229, 255, 0.24);
      background: rgba(0, 229, 255, 0.08);
      color: #00e5ff;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 28px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
    }

    .name {
      font-size: 72px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.03em;
      color: #ededed;
      margin-bottom: 20px;
    }

    .name .accent {
      color: #00e5ff;
    }

    .tagline {
      font-size: 28px;
      font-weight: 500;
      color: #bbbbbb;
      letter-spacing: -0.01em;
      margin-bottom: 32px;
    }

    .url {
      font-size: 20px;
      font-weight: 600;
      color: rgba(0, 229, 255, 0.85);
      letter-spacing: 0.02em;
    }

    .accent-bar {
      position: absolute;
      left: 0;
      top: 0;
      width: 6px;
      height: 100%;
      background: linear-gradient(180deg, #0070f3 0%, #00e5ff 100%);
    }
  </style>
</head>
<body>
  <div class="og">
    <div class="accent-bar" aria-hidden="true"></div>

    <div class="scene" aria-hidden="true">
      <div class="scene__glow"></div>
      <div class="scene__horizon"></div>
      <div class="scene__grid"></div>
      <div class="buildings">
        <div class="building building--1"></div>
        <div class="building building--2"></div>
        <div class="building building--3"></div>
        <div class="building building--4"></div>
        <div class="building building--5"></div>
      </div>
      <div class="particles">
        <span></span><span></span><span></span><span></span>
      </div>
    </div>

    <div class="og__overlay" aria-hidden="true"></div>

    <div class="content">
      <div class="badge">ML</div>
      <h1 class="name">Mariano<span class="accent">_</span>Luna</h1>
      <p class="tagline">Arquitecto BIM &amp; Fullstack Dev</p>
      <p class="url">marianorluna.com</p>
    </div>
  </div>
</body>
</html>
